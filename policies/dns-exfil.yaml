apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: watchpost-dns-exfil
spec:
  kprobes:
    - call: "udp_sendmsg"
      syscall: false
      args:
        - index: 0
          type: "sock"
      selectors:
        - matchArgs:
            - index: 0
              operator: DPort
              values:
                - "53"
          matchBinaries:
            - operator: In
              values:
                - "/usr/bin/node"
                - "/usr/bin/python3"
                - "/usr/bin/curl"
                - "/usr/bin/wget"
          matchActions:
            - action: Post
