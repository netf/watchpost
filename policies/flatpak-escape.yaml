apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: watchpost-flatpak-escape
spec:
  lsmhooks:
    - hook: "security_file_permission"
      args:
        - index: 0
          type: "file"
        - index: 1
          type: "int"
      selectors:
        - matchArgs:
            - index: 0
              operator: Prefix
              values:
                - "/home/"
                - "/etc/"
                - "/root/"
          matchBinaries:
            - operator: In
              values:
                - "/usr/bin/bwrap"
          matchActions:
            - action: Post
        - matchArgs:
            - index: 0
              operator: Prefix
              values:
                - "/home/"
                - "/etc/"
                - "/root/"
          matchNamespaces:
            - namespace: Mnt
              operator: NotIn
              values:
                - "host_mnt"
          matchActions:
            - action: Post
