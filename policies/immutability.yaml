apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: watchpost-immutability
spec:
  kprobes:
    - call: "security_file_open"
      syscall: false
      args:
        - index: 0
          type: "file"
      selectors:
        - matchArgs:
            - index: 0
              operator: Prefix
              values:
                - "/usr/"
                - "/boot/"
                - "/lib/modules/"
          matchBinaries:
            - operator: NotIn
              values:
                - "/usr/bin/rpm-ostree"
                - "/usr/bin/ostree"
                - "/usr/lib/systemd/systemd-sysext"
          matchActions:
            - action: Post
