apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: watchpost-tmp-execution
spec:
  lsmhooks:
    - hook: "bprm_check_security"
      args:
        - index: 0
          type: "linux_binprm"
      selectors:
        - matchArgs:
            - index: 0
              operator: Prefix
              values:
                - "/tmp/"
                - "/dev/shm/"
                - "/var/tmp/"
          matchActions:
            - action: Post
